[env]
MISE_USE_VERSIONS_HOST = "0"

[tools]
actionlint = "1.7.12"
hk = "1.45.0"
lua = "5.4.8"
lua-language-server = "3.18.2"
pkl = "0.31.1"
stylua = "2.4.1"

[tasks.format]
description = "Format Lua scripts"
run = "stylua metadata.lua hooks/"

[tasks.lint]
description = "Lint Lua scripts and GitHub Actions using hk"
run = "hk check"

[tasks.lint-fix]
description = "Fix linting issues"
run = "hk fix"

[tasks.ci]
description = "Run all CI checks (lint, then list, then install several versions)"
depends = ["lint"]
run = [
    "mise run test-available",
    "mise run test-versions",
]
